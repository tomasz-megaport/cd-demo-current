name: Release (manual)

# CURRENT-DEMO POINT:
# Release is fully manual. A human navigates to Actions → Release → Run workflow,
# fills in the form, clicks. Same workflow then deploys to staging and prod
# sequentially in the same run — there is no soak window between them.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump (patch | minor | major)'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.new }}
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute new tag
        id: tag
        run: |
          BUMP="${{ inputs.bump }}"
          LAST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -1)"
          LAST="${LAST_TAG:-v0.0.0}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "${LAST#v}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          SHA="$(git rev-parse --short HEAD)"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Bumping $LAST → $NEW @ $SHA"

      - name: Push tag
        env:
          NEW_TAG: ${{ steps.tag.outputs.new }}
        run: |
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

  deploy-staging:
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to staging
        env:
          GITHUB_SHA: ${{ needs.tag.outputs.sha }}
        run: |
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          deploy/deploy.sh staging

  deploy-prod:
    needs: [tag, deploy-staging]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to prod
        env:
          GITHUB_SHA: ${{ needs.tag.outputs.sha }}
        run: |
          git config user.name 'cd-demo-bot'
          git config user.email 'cd-demo-bot@example.com'
          deploy/deploy.sh prod
